services:
  app:
    build: .
    ports:
      - "4000:4000"
    volumes:
      - ./data:/data
    environment:
      - DATABASE_PATH=/data/saltychart.db
      - JWT_SECRET=${JWT_SECRET:-changeme-replace-in-production}
      - PORT=4000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
